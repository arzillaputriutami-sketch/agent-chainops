<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChainOps Autopilot — RPC Health &amp; Infrastructure Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#050a15;--panel:#07111f;--border:#1fffd41f;--cyan:#22f7ff;--green:#10b981;--red:#ef4444;--yellow:#eab308;--text:#e2e8f0;--muted:#64748b}
  *{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  .mono{font-family:'JetBrains Mono',monospace}.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px}
  .btn{padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;border:none;transition:.2s;font-size:14px}
  .btn-primary{background:var(--cyan);color:#050a15}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{border-color:var(--cyan)}
  input{background:#0f172a;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;outline:none;width:100%;font-size:14px;font-family:'JetBrains Mono',monospace}
  input:focus{border-color:var(--cyan)}
  .badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot-green{background:var(--green);box-shadow:0 0 8px var(--green)}.dot-red{background:var(--red);box-shadow:0 0 8px var(--red)}.dot-yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  .fade-in{animation:fadeIn .3s}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .endpoint-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;margin-bottom:8px;background:#0a1020;border:1px solid transparent;transition:.2s}
  .endpoint-row:hover{border-color:var(--cyan)}
</style>
</head>
<body>
<div class="max-w-6xl mx-auto p-4 lg:p-6">
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-lg" style="background:var(--cyan);color:#050a15">⚡</div>
      <div><h1 class="text-xl font-bold">ChainOps Autopilot</h1><p class="text-xs" style="color:var(--muted)">Real RPC health checker — paste endpoints, get latency + status</p></div>
    </div>
    <button onclick="pingAll()" class="btn btn-primary">🔄 Ping All</button>
  </div>

  <!-- Add Endpoint -->
  <div class="panel p-4 mb-6">
    <div class="flex gap-3 mb-3">
      <input id="rpcInput" placeholder="RPC URL (e.g. https://eth.llamarpc.com)">
      <select id="chainSelect" style="background:#0f172a;border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px">
        <option value="ethereum">Ethereum</option><option value="polygon">Polygon</option><option value="bsc">BSC</option><option value="arbitrum">Arbitrum</option><option value="optimism">Optimism</option><option value="avalanche">Avalanche</option><option value="base">Base</option><option value="solana">Solana</option>
      </select>
      <button onclick="addEndpoint()" class="btn btn-primary">+ Add</button>
    </div>
    <div class="flex flex-wrap gap-2">
      <button onclick="presetEndpoints('eth')" class="btn btn-ghost text-xs">Preset: Ethereum</button>
      <button onclick="presetEndpoints('multichain')" class="btn btn-ghost text-xs">Preset: Multi-chain</button>
      <button onclick="clearAll()" class="btn btn-ghost text-xs">Clear All</button>
    </div>
  </div>

  <!-- Endpoint List -->
  <div id="endpointList" class="mb-6"></div>

  <!-- Summary Stats -->
  <div id="summaryStats" class="hidden grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
    <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">TOTAL ENDPOINTS</p><p id="totalEndpoints" class="text-2xl font-bold mono mt-1">0</p></div>
    <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">ONLINE</p><p id="onlineCount" class="text-2xl font-bold mono mt-1" style="color:var(--green)">0</p></div>
    <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">AVG LATENCY</p><p id="avgLatency" class="text-2xl font-bold mono mt-1">—</p></div>
    <div class="panel p-4"><p class="text-xs" style="color:var(--muted)">FASTEST</p><p id="fastest" class="text-2xl font-bold mono mt-1" style="color:var(--cyan)">—</p></div>
  </div>

  <!-- History Chart -->
  <div id="chartSection" class="hidden panel p-4 mb-6">
    <h3 class="font-semibold mb-3">Latency History</h3>
    <div style="position:relative;height:200px"><canvas id="latencyChart"></canvas></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let endpoints = JSON.parse(localStorage.getItem('chainops-endpoints') || '[]');
let pingHistory = {};
let chart = null;

const PRESETS = {
  eth: [
    { url:'https://eth.llamarpc.com', chain:'ethereum', name:'LlamaRPC' },
    { url:'https://rpc.ankr.com/eth', chain:'ethereum', name:'Ankr' },
    { url:'https://ethereum.publicnode.com', chain:'ethereum', name:'PublicNode' },
    { url:'https://cloudflare-eth.com', chain:'ethereum', name:'Cloudflare' },
    { url:'https://1rpc.io/eth', chain:'ethereum', name:'1RPC' },
  ],
  multichain: [
    { url:'https://eth.llamarpc.com', chain:'ethereum', name:'ETH LlamaRPC' },
    { url:'https://polygon.llamarpc.com', chain:'polygon', name:'Polygon LlamaRPC' },
    { url:'https://arbitrum.llamarpc.com', chain:'arbitrum', name:'Arbitrum LlamaRPC' },
    { url:'https://optimism.llamarpc.com', chain:'optimism', name:'Optimism LlamaRPC' },
    { url:'https://base.llamarpc.com', chain:'base', name:'Base LlamaRPC' },
    { url:'https://bsc.llamarpc.com', chain:'bsc', name:'BSC LlamaRPC' },
  ]
};

function presetEndpoints(name) {
  endpoints = [...PRESETS[name]];
  save();
  render();
  setTimeout(pingAll, 300);
}

function addEndpoint() {
  const url = $('rpcInput').value.trim();
  if (!url) return;
  const chain = $('chainSelect').value;
  const name = new URL(url).hostname;
  endpoints.push({ url, chain, name });
  $('rpcInput').value = '';
  save();
  render();
  pingOne(endpoints.length - 1);
}

function removeEndpoint(i) { endpoints.splice(i, 1); save(); render(); }
function clearAll() { endpoints = []; pingHistory = {}; save(); render(); }
function save() { localStorage.setItem('chainops-endpoints', JSON.stringify(endpoints)); }

function render() {
  const list = $('endpointList');
  if (!endpoints.length) {
    list.innerHTML = '<div class="panel p-8 text-center"><div class="text-5xl mb-4">⚡</div><h3 class="text-lg font-bold">Add RPC Endpoints to Monitor</h3><p class="text-sm mt-2" style="color:var(--muted)">Paste any EVM RPC URL or use a preset to get started</p></div>';
    $('summaryStats').classList.add('hidden');
    $('chartSection').classList.add('hidden');
    return;
  }

  list.innerHTML = endpoints.map((ep, i) => {
    const history = pingHistory[i] || {};
    const statusClass = history.status === 'online' ? 'dot-green' : history.status === 'error' ? 'dot-red' : '';
    const latencyColor = history.latency < 300 ? 'var(--green)' : history.latency < 1000 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="endpoint-row">
      <span class="status-dot ${statusClass}" title="${history.status || 'unchecked'}"></span>
      <div class="flex-1">
        <div class="flex items-center gap-2">
          <span class="font-semibold text-sm">${ep.name || ep.url}</span>
          <span class="badge" style="background:#1e293b;color:var(--cyan)">${ep.chain}</span>
        </div>
        <p class="mono text-xs mt-0.5" style="color:var(--muted)">${ep.url}</p>
      </div>
      <div class="text-right">
        ${history.latency !== undefined ? `<p class="mono text-lg font-bold" style="color:${latencyColor}">${history.latency}ms</p>` : '<p style="color:var(--muted)">—</p>'}
        ${history.blockNumber ? `<p class="mono text-xs" style="color:var(--muted)">Block #${history.blockNumber}</p>` : ''}
      </div>
      <div class="flex gap-1">
        <button onclick="pingOne(${i})" class="btn btn-ghost text-xs" title="Ping">📡</button>
        <button onclick="removeEndpoint(${i})" class="btn btn-ghost text-xs" title="Remove" style="color:var(--red)">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function pingAll() {
  for (let i = 0; i < endpoints.length; i++) {
    await pingOne(i);
    await new Promise(r => setTimeout(r, 100));
  }
  updateSummary();
}

async function pingOne(i) {
  const ep = endpoints[i];
  const start = performance.now();
  try {
    const res = await fetch(ep.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', method: 'eth_blockNumber', params: [], id: 1 }),
      signal: AbortSignal.timeout(10000)
    });
    const latency = Math.round(performance.now() - start);
    const data = await res.json();
    const blockNumber = data.result ? parseInt(data.result, 16) : null;
    
    pingHistory[i] = { status: 'online', latency, blockNumber, timestamp: Date.now() };
    if (!pingHistory[i + '_hist']) pingHistory[i + '_hist'] = [];
    pingHistory[i + '_hist'].push({ latency, time: Date.now() });
    if (pingHistory[i + '_hist'].length > 20) pingHistory[i + '_hist'].shift();
  } catch(e) {
    pingHistory[i] = { status: 'error', latency: Math.round(performance.now() - start), error: e.message, timestamp: Date.now() };
  }
  render();
}

function updateSummary() {
  const online = Object.entries(pingHistory).filter(([k,v]) => !k.includes('_') && v.status === 'online');
  const latencies = online.map(([,v]) => v.latency);
  
  $('summaryStats').classList.remove('hidden');
  $('totalEndpoints').textContent = endpoints.length;
  $('onlineCount').textContent = online.length;
  $('avgLatency').textContent = latencies.length ? Math.round(latencies.reduce((a,b) => a+b, 0) / latencies.length) + 'ms' : '—';
  $('fastest').textContent = latencies.length ? Math.min(...latencies) + 'ms' : '—';

  // Chart
  renderChart();
}

function renderChart() {
  $('chartSection').classList.remove('hidden');
  if (chart) chart.destroy();
  
  const datasets = [];
  const colors = ['#22f7ff','#10b981','#f97316','#ef4444','#8b5cf6','#eab308','#ec4899'];
  
  endpoints.forEach((ep, i) => {
    const hist = pingHistory[i + '_hist'] || [];
    if (hist.length) {
      datasets.push({
        label: ep.name || 'Endpoint ' + i,
        data: hist.map(h => h.latency),
        borderColor: colors[i % colors.length],
        backgroundColor: 'transparent',
        tension: .3,
        pointRadius: 3,
        borderWidth: 2
      });
    }
  });

  if (!datasets.length) return;

  const maxLen = Math.max(...datasets.map(d => d.data.length));
  chart = new Chart($('latencyChart'), {
    type: 'line',
    data: { labels: Array.from({length: maxLen}, (_, i) => '#' + (i+1)), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#64748b', font: { size: 11 } } } },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } },
        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', callback: v => v + 'ms' } }
      }
    }
  });
}

render();
</script>
<script src="static/upgrade.js"></script>
</body>
</html>
